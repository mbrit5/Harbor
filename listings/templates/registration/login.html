{% extends "base.html" %}

{% block title %}Login - Harbor{% endblock %}

{% block content %}
<div class="detail-card text-center">
    <h2>Login to Harbor</h2>

    <form method="post" class="mt-2">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn mt-2">Login</button>
    </form>

    <p class="mt-2">
        Don't have an account?
        <a href="{% url 'signup' %}">Sign up here</a>
    </p>
</div>
{% endblock %}
