{% extends "base.html" %}

{% block title %}Sign Up - Harbor{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Create an Account</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Sign Up</button>
    </form>

    <p>Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>
</div>
{% endblock %}
